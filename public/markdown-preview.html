<html lang="en" data-theme="dark">

<head>

    <!-- /social -->
    <script src="theme-init.js"></script>
    <link rel="stylesheet" href="styles.css">
    <!-- marked for Markdown parsing -->
    <script src="vendor/marked.min.js"></script>
    <!-- DOMPurify to sanitize the rendered HTML -->
    <script src="vendor/purify.min.js"></script>
    <style>
        /* Give both panes room to breathe */
        #tool-markdown-preview .split-pane { min-height: 520px; }
        #tool-markdown-preview .pane textarea { min-height: 460px; resize: vertical; }

        /* The preview pane is a scrollable rendered document */
        .md-preview {
            flex: 1;
            min-height: 460px;
            overflow: auto;
            padding: 22px;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--r-sm);
            color: var(--text-main);
            line-height: 1.65;
            word-wrap: break-word;
        }

        .md-preview-empty { color: var(--text-faint); }

        /* --- Rendered markdown typography --- */
        .md-preview > *:first-child { margin-top: 0; }
        .md-preview > *:last-child { margin-bottom: 0; }

        .md-preview h1,
        .md-preview h2,
        .md-preview h3,
        .md-preview h4,
        .md-preview h5,
        .md-preview h6 {
            margin: 1.4em 0 0.6em;
            line-height: 1.3;
            font-weight: 650;
        }
        .md-preview h1 { font-size: 1.7rem; padding-bottom: 0.3em; border-bottom: 1px solid var(--border-color); }
        .md-preview h2 { font-size: 1.4rem; padding-bottom: 0.3em; border-bottom: 1px solid var(--border-color); }
        .md-preview h3 { font-size: 1.2rem; }
        .md-preview h4 { font-size: 1.05rem; }
        .md-preview h5 { font-size: 0.95rem; }
        .md-preview h6 { font-size: 0.9rem; color: var(--text-muted); }

        .md-preview p { margin: 0.7em 0; }

        .md-preview a { color: var(--primary); text-decoration: none; }
        .md-preview a:hover { text-decoration: underline; }

        .md-preview ul,
        .md-preview ol { margin: 0.7em 0; padding-left: 1.6em; }
        .md-preview li { margin: 0.25em 0; }
        .md-preview li > input[type="checkbox"] { margin-right: 0.5em; }

        .md-preview blockquote {
            margin: 0.9em 0;
            padding: 0.2em 1em;
            color: var(--text-muted);
            border-left: 3px solid var(--border-color);
        }

        .md-preview code {
            font-family: var(--font-mono);
            font-size: 0.88em;
            background-color: var(--bg-subtle);
            padding: 0.15em 0.4em;
            border-radius: 5px;
        }
        .md-preview pre {
            margin: 0.9em 0;
            padding: 14px 16px;
            background-color: var(--bg-subtle);
            border: 1px solid var(--border-color);
            border-radius: var(--r-sm);
            overflow: auto;
        }
        .md-preview pre code {
            background: none;
            padding: 0;
            font-size: 0.85rem;
            line-height: 1.55;
        }

        .md-preview table {
            border-collapse: collapse;
            margin: 0.9em 0;
            width: 100%;
            display: block;
            overflow: auto;
        }
        .md-preview th,
        .md-preview td {
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            text-align: left;
        }
        .md-preview th { background-color: var(--bg-subtle); font-weight: 600; }

        .md-preview hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 1.6em 0;
        }

        .md-preview img { max-width: 100%; height: auto; border-radius: var(--r-sm); }

        .md-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            padding: 14px 18px;
            margin-bottom: 16px;
        }
        .md-toolbar-actions { display: flex; gap: 10px; flex-wrap: wrap; }

        /* Drag & drop overlay on the input pane */
        #md-input-pane { position: relative; }
        .md-dropzone {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--primary);
            border-radius: var(--r-md);
            background-color: var(--primary-soft);
            color: var(--active-text);
            font-size: 0.95rem;
            pointer-events: none;
            z-index: 2;
        }
        #md-input-pane.dragover .md-dropzone { display: flex; }

        /* Both panes share width evenly by default; the splitter pins the
           input pane to a fixed px width via an inline style when dragged. */
        #tool-markdown-preview #md-input-pane { flex: 1 1 0; min-width: 0; }
        #tool-markdown-preview .split-pane > .pane:last-child { flex: 1 1 0; min-width: 0; }

        /* Draggable divider between the two panes */
        .md-splitter {
            flex: 0 0 10px;
            align-self: stretch;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: col-resize;
            border-radius: 6px;
            background-color: transparent;
            transition: background-color 0.15s ease;
            touch-action: none;
        }
        .md-splitter:hover,
        .md-split.resizing .md-splitter { background-color: var(--bg-hover); }
        .md-splitter-grip {
            width: 3px;
            height: 42px;
            border-radius: 3px;
            background-color: var(--border-color);
        }
        .md-splitter:hover .md-splitter-grip,
        .md-split.resizing .md-splitter-grip { background-color: var(--primary); }

        /* Fully collapsed input */
        #md-split.input-hidden #md-input-pane,
        #md-split.input-hidden .md-splitter { display: none; }

        /* Keep text selectable normally, but suppress it while dragging */
        .md-split.resizing { user-select: none; cursor: col-resize; }

        @media (max-width: 860px) {
            /* Stacked layout on small screens — the horizontal splitter no longer applies */
            .md-splitter { display: none; }
            #tool-markdown-preview #md-input-pane { flex: 1 1 auto; }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="app-sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar" id="app-topbar">
                <div class="topbar-title">
                    <h1 id="current-tool-title">Markdown Preview</h1>
                    <p id="current-tool-desc" class="topbar-desc">Paste Markdown and preview the formatted result</p>
                </div>
            </header>

            <div class="tools-container">
                <!-- Markdown Preview Tool -->
                <section id="tool-markdown-preview" class="tool-section active">
                    <div class="md-toolbar card">
                        <div class="field-hint">Paste Markdown on the left — the formatted preview updates on the right.</div>
                        <div class="md-toolbar-actions">
                            <button id="btn-md-toggle" class="btn">Hide input</button>
                            <button id="btn-md-sample" class="btn">Load sample</button>
                            <button id="btn-md-clear" class="btn">Clear</button>
                            <button class="btn btn-small copy-btn" data-clipboard-target="#md-input">Copy Markdown</button>
                        </div>
                    </div>

                    <div class="split-pane" id="md-split">
                        <div class="pane" id="md-input-pane">
                            <label for="md-input">Markdown</label>
                            <div class="field-hint">Paste or drag &amp; drop a <code>.md</code> file here.</div>
                            <textarea id="md-input" placeholder="# Hello&#10;&#10;Paste your Markdown here, or drop a .md file…"></textarea>
                            <div class="md-dropzone" id="md-dropzone">Drop your <strong>.md</strong> file to load it</div>
                        </div>
                        <div class="md-splitter" id="md-splitter" title="Drag to resize — double-click to reset">
                            <span class="md-splitter-grip"></span>
                        </div>
                        <div class="pane">
                            <label>Preview</label>
                            <div class="field-hint">Rendered, read-only output.</div>
                            <div id="md-output" class="md-preview">
                                <span class="md-preview-empty">Preview appears here…</span>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Copied to clipboard!</div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('md-input');
            const output = document.getElementById('md-output');
            const emptyMsg = '<span class="md-preview-empty">Preview appears here…</span>';

            // GitHub-flavored markdown, line breaks on single newline.
            if (typeof marked !== 'undefined') {
                marked.setOptions({ gfm: true, breaks: true });
            }

            function render() {
                const src = input.value;
                if (!src.trim()) {
                    output.innerHTML = emptyMsg;
                    return;
                }
                if (typeof marked === 'undefined') {
                    output.textContent = 'Markdown renderer failed to load. Check your connection.';
                    return;
                }
                const rawHtml = marked.parse(src);
                // Sanitize so pasted markdown can't inject scripts.
                output.innerHTML = (typeof DOMPurify !== 'undefined')
                    ? DOMPurify.sanitize(rawHtml)
                    : rawHtml;
            }

            input.addEventListener('input', render);

            // --- Drag & drop a .md file onto the input pane ---
            const pane = document.getElementById('md-input-pane');
            const MD_EXT = /\.(md|markdown|mdown|mkd|mkdn|txt)$/i;

            function loadFile(file) {
                if (!file) return;
                if (!MD_EXT.test(file.name) && file.type && !/text|markdown/.test(file.type)) {
                    window.showToast && window.showToast('Not a Markdown file', true);
                    return;
                }
                const reader = new FileReader();
                reader.onload = () => {
                    input.value = reader.result;
                    render();
                    window.showToast && window.showToast('Loaded ' + file.name);
                };
                reader.onerror = () => window.showToast && window.showToast('Could not read file', true);
                reader.readAsText(file);
            }

            let dragDepth = 0; // ignore dragenter/leave bubbling from children
            pane.addEventListener('dragenter', (e) => {
                e.preventDefault();
                dragDepth++;
                pane.classList.add('dragover');
            });
            pane.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'copy';
            });
            pane.addEventListener('dragleave', (e) => {
                e.preventDefault();
                if (--dragDepth <= 0) { dragDepth = 0; pane.classList.remove('dragover'); }
            });
            pane.addEventListener('drop', (e) => {
                e.preventDefault();
                dragDepth = 0;
                pane.classList.remove('dragover');
                const file = e.dataTransfer.files && e.dataTransfer.files[0];
                loadFile(file);
            });

            // --- Resizable split bar between input and preview ---
            const split = document.getElementById('md-split');
            const splitter = document.getElementById('md-splitter');
            const toggleBtn = document.getElementById('btn-md-toggle');
            const MIN_PANE = 120; // px — smaller than this on either side snaps to that edge

            let dragging = false;

            function setInputWidth(px) {
                pane.style.flex = '0 0 ' + px + 'px';
            }

            function onMove(clientX) {
                const rect = split.getBoundingClientRect();
                const gap = 16 + splitter.offsetWidth; // split-pane gap(s) + splitter
                let width = clientX - rect.left;
                const max = rect.width - gap - MIN_PANE;
                if (width < MIN_PANE) width = MIN_PANE;
                if (width > max) width = max;
                setInputWidth(width);
            }

            splitter.addEventListener('pointerdown', (e) => {
                if (split.classList.contains('input-hidden')) return;
                dragging = true;
                split.classList.add('resizing');
                splitter.setPointerCapture(e.pointerId);
                e.preventDefault();
            });
            splitter.addEventListener('pointermove', (e) => {
                if (dragging) onMove(e.clientX);
            });
            splitter.addEventListener('pointerup', (e) => {
                dragging = false;
                split.classList.remove('resizing');
                if (splitter.hasPointerCapture(e.pointerId)) splitter.releasePointerCapture(e.pointerId);
            });
            // Double-click resets to an even 50/50 split
            splitter.addEventListener('dblclick', () => { pane.style.flex = ''; });

            // --- Hide / show the raw input pane ---
            function setHidden(hidden) {
                split.classList.toggle('input-hidden', hidden);
                toggleBtn.textContent = hidden ? 'Show input' : 'Hide input';
            }
            toggleBtn.addEventListener('click', () => {
                setHidden(!split.classList.contains('input-hidden'));
            });

            document.getElementById('btn-md-clear').addEventListener('click', () => {
                input.value = '';
                render();
                input.focus();
            });

            document.getElementById('btn-md-sample').addEventListener('click', () => {
                input.value = SAMPLE;
                render();
            });

            const SAMPLE = [
                '# Markdown Preview',
                '',
                'A quick tour of **Markdown** formatting.',
                '',
                '## Text styles',
                '',
                'You can write *italic*, **bold**, ~~strikethrough~~, and `inline code`.',
                '',
                '> Blockquotes are handy for callouts and quotes.',
                '',
                '## Lists',
                '',
                '- First item',
                '- Second item',
                '  - Nested item',
                '',
                '1. Ordered one',
                '2. Ordered two',
                '',
                '- [x] Completed task',
                '- [ ] Pending task',
                '',
                '## Code block',
                '',
                '```js',
                'function greet(name) {',
                '  return `Hello, ${name}!`;',
                '}',
                '```',
                '',
                '## Table',
                '',
                '| Tool | Purpose |',
                '| ---- | ------- |',
                '| JWT  | Decode tokens |',
                '| QR   | Generate codes |',
                '',
                '## Link',
                '',
                '[Back to LocalUtil](index.html)',
                ''
            ].join('\n');
        });
    </script>
</body>

</html>
