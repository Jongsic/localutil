    <style>
        #tool-totp .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 14px; }
        @media (max-width: 560px) { #tool-totp .form-grid { grid-template-columns: 1fr; } }

        .totp-display {
            display: flex;
            align-items: center;
            gap: 22px;
            padding: 26px 24px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .totp-code {
            font-family: var(--font-mono);
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: var(--text-main);
        }
        .totp-code.invalid { font-size: 1.1rem; letter-spacing: 0; color: var(--danger); font-family: inherit; font-weight: 600; }
        .totp-code .grp { margin-right: 0.15em; }

        .totp-ring { position: relative; width: 54px; height: 54px; flex-shrink: 0; }
        .totp-ring svg { transform: rotate(-90deg); }
        .totp-ring .track { stroke: var(--border-color); }
        .totp-ring .fill { stroke: var(--primary); transition: stroke-dashoffset 1s linear; }
        .totp-ring span {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 700; color: var(--text-muted);

        .totp-meta { color: var(--text-muted); font-size: 0.85rem; margin-left: auto; }

<body>
    <div class="app-container">
        <aside class="sidebar" id="app-sidebar"></aside>

        <main class="main-content">
            <header class="topbar" id="app-topbar">
                <div class="topbar-title">
                    <h1 id="current-tool-title">TOTP Generator</h1>
                    <p id="current-tool-desc" class="topbar-desc">Generate 2FA codes from a TOTP secret</p>
                </div>
            </header>

            <div class="tools-container">
                <section id="tool-totp" class="tool-section active">
                    <div class="card" style="padding:20px;">
                        <label for="totp-secret">TOTP secret</label>
                        <div class="field-hint">Base32 secret or an <code>otpauth://</code> URI. Computed locally — your secret never leaves the browser.</div>
                        <input type="text" id="totp-secret" placeholder="JBSWY3DPEHPK3PXP  or  otpauth://totp/...">

                        <div class="form-grid">
                            <div>
                                <label for="totp-digits">Digits</label>
                                <select id="totp-digits" class="select-small">
                                    <option value="6" selected>6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                </select>
                            </div>
                            <div>
                                <label for="totp-period">Period (s)</label>
                                <select id="totp-period" class="select-small">
                                    <option value="30" selected>30</option>
                                    <option value="60">60</option>
                                </select>
                            </div>
                            <div>
                                <label for="totp-algo">Algorithm</label>
                                <select id="totp-algo" class="select-small">
                                    <option value="SHA-1" selected>SHA-1</option>
                                    <option value="SHA-256">SHA-256</option>
                                    <option value="SHA-512">SHA-512</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="card totp-display">
                        <div class="totp-ring">
                            <svg width="54" height="54" viewBox="0 0 54 54">
                                <circle class="track" cx="27" cy="27" r="24" fill="none" stroke-width="4"></circle>
                                <circle class="fill" id="totp-ring-fill" cx="27" cy="27" r="24" fill="none" stroke-width="4"
                                    stroke-linecap="round" stroke-dasharray="150.8" stroke-dashoffset="0"></circle>
                            </svg>
                            <span id="totp-remaining">–</span>
                        </div>
                        <div class="totp-code invalid" id="totp-code">Enter a secret to begin</div>
                        <div class="totp-meta" id="totp-meta"></div>
                    </div>
                    <div class="totp-actions">
                        <button class="btn btn-small copy-btn" data-clipboard-target="#totp-code-raw">Copy code</button>
                        <input type="hidden" id="totp-code-raw">
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div id="toast" class="toast">Copied to clipboard!</div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const secretIn = document.getElementById('totp-secret');
            const digitsSel = document.getElementById('totp-digits');
            const periodSel = document.getElementById('totp-period');
            const algoSel = document.getElementById('totp-algo');
            const codeEl = document.getElementById('totp-code');
            const codeRaw = document.getElementById('totp-code-raw');
            const ringFill = document.getElementById('totp-ring-fill');
            const remainEl = document.getElementById('totp-remaining');
            const metaEl = document.getElementById('totp-meta');
            const RING_LEN = 2 * Math.PI * 24; // ~150.8

            const enc = new TextEncoder();

            function base32Decode(input) {
                const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
                const clean = input.replace(/=+$/, '').replace(/\s+/g, '').toUpperCase();
                let bits = '';
                for (const ch of clean) {
                    const idx = alphabet.indexOf(ch);
                    if (idx === -1) throw new Error('Invalid Base32 character "' + ch + '"');
                    bits += idx.toString(2).padStart(5, '0');
                }
                const bytes = [];
                for (let i = 0; i + 8 <= bits.length; i += 8) bytes.push(parseInt(bits.slice(i, i + 8), 2));
                if (!bytes.length) throw new Error('Secret is empty');
                return new Uint8Array(bytes);
            }

            async function totp(secretBytes, digits, period, hashAlgo, epochSec) {
                const counter = Math.floor(epochSec / period);
                const msg = new Uint8Array(8);
                let c = counter;
                for (let i = 7; i >= 0; i--) { msg[i] = c & 0xff; c = Math.floor(c / 256); }
                const key = await crypto.subtle.importKey('raw', secretBytes, { name: 'HMAC', hash: hashAlgo }, false, ['sign']);
                const sig = new Uint8Array(await crypto.subtle.sign('HMAC', key, msg));
                const offset = sig[sig.length - 1] & 0x0f;
                const bin = ((sig[offset] & 0x7f) << 24) | ((sig[offset + 1] & 0xff) << 16) |
                    ((sig[offset + 2] & 0xff) << 8) | (sig[offset + 3] & 0xff);
                return (bin % Math.pow(10, digits)).toString().padStart(digits, '0');
            }

            // Pull settings out of an otpauth:// URI when one is pasted.
            function applyUri(value) {
                if (!/^otpauth:\/\//i.test(value.trim())) return null;
                try {
                    const url = new URL(value.trim());
                    const p = url.searchParams;
                    const secret = p.get('secret');
                    if (!secret) return null;
                    if (p.get('digits')) digitsSel.value = p.get('digits');
                    if (p.get('period')) periodSel.value = p.get('period');
                    const algo = (p.get('algorithm') || '').toUpperCase();
                    if (algo === 'SHA1') algoSel.value = 'SHA-1';
                    else if (algo === 'SHA256') algoSel.value = 'SHA-256';
                    else if (algo === 'SHA512') algoSel.value = 'SHA-512';
                    return { secret, label: decodeURIComponent(url.pathname.replace(/^\/+/, '')) };
                } catch (e) { return null; }
            }

            function showInvalid(msg) {
                codeEl.className = 'totp-code invalid';
                codeEl.textContent = msg;
                codeRaw.value = '';
                metaEl.textContent = '';
            }

            function groupCode(code) {
                const mid = Math.ceil(code.length / 2);
                return '<span class="grp">' + code.slice(0, mid) + '</span>' + code.slice(mid);
            }

            let secretBytes = null;
            let lastLabel = '';

            function refreshSecret() {
                const raw = secretIn.value.trim();
                lastLabel = '';
                if (!raw) { secretBytes = null; showInvalid('Enter a secret to begin'); return; }
                let secretStr = raw;
                const parsed = applyUri(raw);
                if (parsed) { secretStr = parsed.secret; lastLabel = parsed.label; }
                try {
                    secretBytes = base32Decode(secretStr);
                } catch (e) {
                    secretBytes = null;
                    showInvalid(e.message);
                }
            }

            async function tick() {
                const period = parseInt(periodSel.value, 10);
                const nowSec = Date.now() / 1000;
                const remaining = Math.ceil(period - (nowSec % period));

                // Countdown ring + label
                const frac = (period - (nowSec % period)) / period;
                ringFill.style.strokeDashoffset = (RING_LEN * (1 - frac)).toFixed(2);
                remainEl.textContent = remaining;

                if (!secretBytes) return;
                try {
                    const digits = parseInt(digitsSel.value, 10);
                    const code = await totp(secretBytes, digits, period, algoSel.value, nowSec);
                    codeEl.className = 'totp-code';
                    codeEl.innerHTML = groupCode(code);
                    codeRaw.value = code;
                    metaEl.textContent = (lastLabel ? lastLabel + ' · ' : '') + 'refreshes in ' + remaining + 's';
                } catch (e) {
                    showInvalid(e.message);
                }
            }

            secretIn.addEventListener('input', () => { refreshSecret(); tick(); });
            [digitsSel, periodSel, algoSel].forEach(el => el.addEventListener('change', tick));

            refreshSecret();
            tick();
            setInterval(tick, 1000);
        });
    </script>
</body>

</html>
