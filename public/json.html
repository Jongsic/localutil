<html lang="en" data-theme="dark">

<head>

    <script src="vendor/beautify.min.js"></script>

    <style>
        .json-toolbar {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            padding: 16px 18px;
        }
        .json-toolbar-group { display: flex; flex-direction: column; gap: 4px; }
        .json-toolbar-group select { width: auto; min-width: 120px; }
        .json-toolbar-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

        /* Editors: fixed default height so vertical drag-resize sticks;
           on desktop, fill the window height. */
        #tool-json .pane textarea,
        #tool-json .json-tree {
            flex: none;
            height: 460px;
            min-height: 240px;
            resize: vertical;
        }
        @media (min-width: 861px) {
            #tool-json .pane textarea,
            #tool-json .json-tree {
                height: max(460px, calc(100vh - 310px));
            }
        }

        /* Validation status line */
        .json-status {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .json-status .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--text-faint); }
        .json-status.ok { color: var(--success); }
        .json-status.ok .dot { background: var(--success); }
        .json-status.err { color: var(--danger); }
        .json-status.err .dot { background: var(--danger); }

        /* View toggle */
        .seg { display: inline-flex; border: 1px solid var(--border-color); border-radius: var(--r-sm); overflow: hidden; }
        .seg button {
            border: none;
            background: var(--bg-input);
            color: var(--text-muted);
            padding: 7px 14px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }
        .seg button.active { background: var(--primary); color: #fff; }

        /* Tree view */
        .json-tree {
            flex: 1;
            min-height: 460px;
            overflow: auto;
            padding: 16px;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--r-sm);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            line-height: 1.6;
        }
        .json-tree details { padding-left: 14px; }
        .json-tree > details { padding-left: 0; }
        .json-tree summary {
            cursor: pointer;
            list-style: none;
            outline: none;
            margin-left: -14px;
            padding-left: 14px;
            position: relative;
        }
        .json-tree > summary, .json-tree > details > summary { margin-left: 0; padding-left: 14px; }
        .json-tree summary::before {
            content: '▸';
            position: absolute;
            left: 0;
            color: var(--text-faint);
            transition: transform 0.12s;
        }
        .json-tree details[open] > summary::before { transform: rotate(90deg); }
        .jt-key { color: var(--primary); }
        .jt-string { color: var(--success); }
        .jt-number { color: var(--warning); }
        .jt-bool { color: #c678dd; }
        .jt-null { color: var(--text-faint); }
        .jt-meta { color: var(--text-faint); }
        .jt-leaf { padding-left: 14px; }
    </style>
</head>

<body>
    <div class="app-container">
        <aside class="sidebar" id="app-sidebar"></aside>

        <main class="main-content">
            <header class="topbar" id="app-topbar">
                <div class="topbar-title">
                    <h1 id="current-tool-title">JSON Formatter</h1>
                    <p id="current-tool-desc" class="topbar-desc">Format, validate &amp; explore JSON as a tree</p>
                </div>
            </header>

            <div class="tools-container">
                <section id="tool-json" class="tool-section active">
                    <div class="json-toolbar card">
                        <div class="json-toolbar-group">
                            <label for="json-indent">Indentation</label>
                            <select id="json-indent" class="select-small">
                                <option value="2">2 spaces</option>
                                <option value="4">4 spaces</option>
                                <option value="tab">Tab</option>
                            </select>
                        </div>
                        <div class="json-toolbar-actions">
                            <button id="btn-json-format" class="btn btn-primary">Format</button>
                            <button id="btn-json-minify" class="btn">Minify</button>
                            <button id="btn-json-sample" class="btn">Sample</button>
                            <button id="btn-json-clear" class="btn">Clear</button>
                        </div>
                    </div>

                    <div class="split-pane">
                        <div class="pane">
                            <label for="json-input">Input</label>
                            <div class="field-hint">Paste JSON here — everything is parsed locally in your browser.</div>
                            <textarea id="json-input" placeholder='{ "hello": "world" }'></textarea>
                        </div>
                        <div class="pane">
                            <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;">
                                <span class="json-status" id="json-status"><span class="dot"></span><span id="json-status-text">Waiting for input…</span></span>
                                <div class="seg" id="json-view-toggle">
                                    <button data-view="text" class="active">Text</button>
                                    <button data-view="tree">Tree</button>
                                </div>
                            </div>
                            <div class="field-hint">Formatted output or an interactive, collapsible tree.</div>
                            <textarea id="json-output" placeholder="Result appears here…" readonly></textarea>
                            <div id="json-tree" class="json-tree" style="display:none;"></div>
                            <button class="btn btn-small copy-btn" data-clipboard-target="#json-output">Copy</button>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div id="toast" class="toast">Copied to clipboard!</div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('json-input');
            const output = document.getElementById('json-output');
            const treeEl = document.getElementById('json-tree');
            const indentSel = document.getElementById('json-indent');
            const statusEl = document.getElementById('json-status');
            const statusText = document.getElementById('json-status-text');
            const viewToggle = document.getElementById('json-view-toggle');

            let currentView = 'text';
            let lastParsed = undefined;
            let lastValid = false;

            function indentValue() {
                const v = indentSel.value;
                if (v === 'tab') return '\t';
                return parseInt(v, 10);
            }

            function setStatus(kind, text) {
                statusEl.className = 'json-status' + (kind ? ' ' + kind : '');
                statusText.textContent = text;
            }

            // Parse input, remember result, and refresh the status line.
            function parse() {
                const raw = input.value.trim();
                if (!raw) {
                    lastValid = false;
                    lastParsed = undefined;
                    setStatus('', 'Waiting for input…');
                    return false;
                }
                try {
                    lastParsed = JSON.parse(raw);
                    lastValid = true;
                    setStatus('ok', 'Valid JSON');
                    return true;
                } catch (e) {
                    lastValid = false;
                    lastParsed = undefined;
                    // Our own parser pinpoints the error; JSON.parse messages
                    // don't reliably carry line/column across engines.
                    const res = LocalUtilJsonLint.validate(input.value);
                    setStatus('err', res.ok
                        ? 'Invalid JSON — ' + e.message
                        : `Invalid JSON — line ${res.line}, column ${res.col}: ${res.message}`);
                    return false;
                }
            }

            // On broken input: pretty-print it anyway (js_beautify is lenient),
            // locate the error in the formatted text, and show a caret snippet
            // in the output pane / tree area.
            let errorShown = false;
            function showInvalidSnippet() {
                const raw = input.value;
                let pretty = raw;
                // Skip pretty-printing huge inputs — this runs while typing
                if (typeof js_beautify !== 'undefined' && raw.length < 300000) {
                    const iv = indentValue();
                    pretty = js_beautify(raw, iv === '\t'
                        ? { indent_size: 1, indent_char: '\t' }
                        : { indent_size: iv, indent_char: ' ' });
                }
                const res = LocalUtilJsonLint.validate(pretty);
                if (res.ok) return;
                const snip = LocalUtilJsonLint.snippet(pretty, res);
                output.value = snip;
                errorShown = true;
                if (currentView === 'tree') {
                    treeEl.innerHTML = '';
                    const pre = document.createElement('pre');
                    pre.style.margin = '0';
                    pre.style.fontFamily = 'inherit';
                    pre.textContent = snip;
                    treeEl.appendChild(pre);
                }
            }

            function render() {
                parse();
                if (currentView === 'tree') {
                    treeEl.innerHTML = '';
                    if (lastValid) treeEl.appendChild(buildNode(lastParsed, null, true));
                } else if (lastValid) {
                    output.value = JSON.stringify(lastParsed, null, indentValue());
                }
            }

            function format() {
                if (!parse()) { showInvalidSnippet(); return; }
                output.value = JSON.stringify(lastParsed, null, indentValue());
                if (currentView === 'tree') switchView('text');
            }

            function minify() {
                if (!parse()) { showInvalidSnippet(); return; }
                output.value = JSON.stringify(lastParsed);
                if (currentView === 'tree') switchView('text');
            }

            // ---- Tree builder (collapsible via <details>) ----
            function typeClass(v) {
                if (v === null) return 'jt-null';
                if (typeof v === 'string') return 'jt-string';
                if (typeof v === 'number') return 'jt-number';
                if (typeof v === 'boolean') return 'jt-bool';
                return '';
            }
            function formatLeaf(v) {
                if (v === null) return 'null';
                if (typeof v === 'string') return JSON.stringify(v);
                return String(v);
            }
            function keySpan(key) {
                if (key === null) return '';
                const s = document.createElement('span');
                s.className = 'jt-key';
                s.textContent = JSON.stringify(key) + ': ';
                return s.outerHTML;
            }

            function buildNode(value, key, isRoot) {
                const isObj = value && typeof value === 'object';
                if (!isObj) {
                    const leaf = document.createElement('div');
                    leaf.className = 'jt-leaf';
                    leaf.innerHTML = keySpan(key) + '<span class="' + typeClass(value) + '">' +
                        escapeHtml(formatLeaf(value)) + '</span>';
                    return leaf;
                }
                const isArr = Array.isArray(value);
                const entries = isArr ? value.map((v, i) => [i, v]) : Object.entries(value);
                const details = document.createElement('details');
                if (isRoot) details.open = true;
                const summary = document.createElement('summary');
                const brace = isArr ? '[' + entries.length + ']' : '{' + entries.length + '}';
                summary.innerHTML = keySpan(key) +
                    '<span class="jt-meta">' + (isArr ? 'Array ' : 'Object ') + brace + '</span>';
                details.appendChild(summary);
                entries.forEach(([k, v]) => details.appendChild(buildNode(v, isArr ? null : k, false)));
                return details;
            }

            function escapeHtml(s) {
                return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }

            function switchView(view) {
                currentView = view;
                viewToggle.querySelectorAll('button').forEach(b =>
                    b.classList.toggle('active', b.dataset.view === view));
                const treeMode = view === 'tree';
                treeEl.style.display = treeMode ? '' : 'none';
                output.style.display = treeMode ? 'none' : '';
                render();
                if (!lastValid && errorShown) showInvalidSnippet();
            }

            // ---- Wiring ----
            input.addEventListener('input', () => {
                const ok = parse();
                if (currentView === 'tree') render();
                clearTimeout(showInvalidSnippet._t);
                if (!ok && input.value.trim()) {
                    // Debounced: pretty-printing every keystroke would be wasteful
                    showInvalidSnippet._t = setTimeout(showInvalidSnippet, 150);
                } else if (errorShown) {
                    errorShown = false;
                    output.value = ok ? JSON.stringify(lastParsed, null, indentValue()) : '';
                }
            });
            indentSel.addEventListener('change', () => { if (currentView === 'text' && lastValid && output.value) format(); });
            document.getElementById('btn-json-format').addEventListener('click', format);
            document.getElementById('btn-json-minify').addEventListener('click', minify);
            document.getElementById('btn-json-clear').addEventListener('click', () => {
                input.value = ''; output.value = ''; treeEl.innerHTML = ''; parse(); input.focus();
            });
            document.getElementById('btn-json-sample').addEventListener('click', () => {
                input.value = JSON.stringify({
                    name: "LocalUtil", version: 1.4, private: true,
                    tags: ["local", "fast", "no-tracking"],
                    author: { name: "you", email: null },
                    tools: [{ id: 1, name: "JSON" }, { id: 2, name: "Diff" }]
                });
                format();
            });
            viewToggle.querySelectorAll('button').forEach(b =>
                b.addEventListener('click', () => switchView(b.dataset.view)));

            parse();
        });
    </script>
</body>

</html>
