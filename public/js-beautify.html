    <script src="theme-init.js"></script>
    <link rel="stylesheet" href="styles.css">
    <!-- js-beautify for JS beautifier -->
    <script src="vendor/beautify.min.js"></script>
    <style>
        /* Toolbar: indent option on the left, actions on the right */
        .jsb-toolbar {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            padding: 16px 18px;
        }

        .jsb-toolbar-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .jsb-toolbar-group label { margin-bottom: 2px; }
        .jsb-toolbar-group select { width: auto; min-width: 130px; }

        .jsb-toolbar-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Let the output textarea breathe below its two-line header + copy button */
        #tool-js-beautify .pane textarea { min-height: 340px; }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="app-sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar" id="app-topbar">
                <div class="topbar-title">
                    <h1 id="current-tool-title">JS Beautifier</h1>
                    <p id="current-tool-desc" class="topbar-desc">Format and prettify JavaScript</p>
                </div>
            </header>

            <div class="tools-container">
                <!-- JS Beautifier Tool -->
                <section id="tool-js-beautify" class="tool-section active">
                    <div class="jsb-toolbar card">
                        <div class="jsb-toolbar-group">
                            <label for="js-indent">Indentation</label>
                            <select id="js-indent" class="select-small">
                                <option value="2">2 spaces</option>
                                <option value="4">4 spaces</option>
                                <option value="tab">Tab</option>
                            </select>
                            <div class="field-hint">Applied when formatting.</div>
                        </div>
                        <div class="jsb-toolbar-actions">
                            <button id="btn-js-format" class="btn btn-primary">Format</button>
                            <button id="btn-js-minify" class="btn">Minify</button>
                        </div>
                    </div>

                    <div class="split-pane">
                        <div class="pane">
                            <label for="js-input">Input</label>
                            <div class="field-hint">Paste minified or messy JavaScript / JSON.</div>
                            <textarea id="js-input" placeholder="Enter minified JS or JSON…"></textarea>
                        </div>
                        <div class="pane">
                            <label for="js-output">Output</label>
                            <div class="field-hint">Formatted or minified result appears here.</div>
                            <textarea id="js-output" placeholder="Result appears here…" readonly></textarea>
                            <button class="btn btn-small copy-btn" data-clipboard-target="#js-output">Copy</button>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Copied to clipboard!</div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('js-input');
            const output = document.getElementById('js-output');
            const indentSelect = document.getElementById('js-indent');

            document.getElementById('btn-js-minify').addEventListener('click', () => {
                const val = input.value;
                if (!val) return;

                try {
                    // Try to parse as JSON and re-stringify compactly
                    output.value = JSON.stringify(JSON.parse(val));
                } catch (e) {
                    // Not valid JSON — strip unnecessary whitespace
                    output.value = val.replace(/\s+/g, ' ').trim();
                }
            });

            document.getElementById('btn-js-format').addEventListener('click', () => {
                const val = input.value;
                if (!val) return;

                let indent_size = 2;
                let indent_char = " ";
                const indentConf = indentSelect.value;
                if (indentConf === "4") {
                    indent_size = 4;
                } else if (indentConf === "tab") {
                    indent_size = 1;
                    indent_char = "\t";
                }

                try {
                    // Check if beautifier is loaded from CDN
                    if (typeof js_beautify !== 'undefined') {
                        output.value = js_beautify(val, {
                            indent_size: indent_size,
                            indent_char: indent_char,
                            space_in_empty_paren: true
                        });
                    } else {
                        // Fallback basic json parse formatting if js_beautify fails to load
                        try {
                            output.value = JSON.stringify(JSON.parse(val), null, indentConf === 'tab' ? '\t' : indent_size);
                        } catch (e) {
                            output.value = "js_beautify script not loaded, and input is not valid JSON.";
                        }
                    }
                } catch (e) {
                    output.value = "Error: " + e.message;
                }
            });
        });
    </script>
</body>

</html>
